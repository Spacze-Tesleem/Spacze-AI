kind = "web"
previewPath = "/"
title = "Spacze AI Agent"
version = "1.0.0"
id = "artifacts/spacze"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19479

[services.development]
run = "pnpm --filter @workspace/spacze run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spacze", "run", "build" ]
publicDir = "artifacts/spacze/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19479"
BASE_PATH = "/"
